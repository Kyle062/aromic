<link
  href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@100..900&display=swap"
  rel="stylesheet"
/>
<link
  href="https://fonts.googleapis.com/css2?family=Lusitana:wght@400;700&display=swap"
  rel="stylesheet"
/>
<ion-content [fullscreen]="true">
  <div class="login-wrapper">
    <div class="glass-card">
      <div class="header-section">
        <img src="assets/aromic logo.png" class="logo" alt="Aromic Logo" />
        <p class="subtitle">Architecture & Interior Design</p>
        <hr class="line-bottom" />
      </div>
      <h2 class="welcome-text">Welcome back to Your Studio!</h2>
      <p class="instr-text">
        Enter your credentials to continue your design journey
      </p>

      <div class="form-container">
        <div class="input-group">
          <label>Email/ Username:</label>
          <ion-input
            type="text"
            [(ngModel)]="identifier"
            placeholder="admin@aromic.com"
            class="custom-input"
          ></ion-input>
        </div>

        <div class="input-group">
          <div class="label-row">
            <label>Password:</label>
            <a class="forgot-link">Forgot Password?</a>
          </div>
          <div class="password-wrapper">
            <ion-input
              [type]="passwordType"
              [(ngModel)]="password"
              placeholder="••••••••••••"
              class="custom-input"
            ></ion-input>
            <ion-icon
              [name]="passwordIcon"
              (click)="togglePassword()"
              class="toggle-icon"
            ></ion-icon>
          </div>
        </div>

        <div class="remember-me">
          <ion-checkbox
            [(ngModel)]="rememberMe"
            labelPlacement="end"
            justify="start"
            >Remember me</ion-checkbox
          >
        </div>

        <ion-button (click)="login()" class="login-btn" expand="block">
          LOGIN
        </ion-button>

        <div class="separator">
          <span class="line"></span>
          <span class="sep-text">or continue with</span>
          <span class="line"></span>
        </div>

        <div class="social-auth">
          <img
            src="../../assets/icon/google.png"
            alt="Google"
            class="social-icon google"
          />
          <img
            src="../../assets/icon/facebook.png"
            alt="Facebook"
            class="social-icon facebook"
          />
        </div>

        <p class="signup-prompt">
          Doesn't have an account? <a routerLink="/signup">Sign up</a>
        </p>
      </div>
    </div>

    <div class="footer-section">
      <div class="pagination-dots">
        <span class="dot"></span>
        <span class="dot active"></span>
        <span class="dot"></span>
      </div>
      <p class="luxury-text">Crafting Spaces. Defining Luxury.</p>
    </div>
  </div>
</ion-content>
