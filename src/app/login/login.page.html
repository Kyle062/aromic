<link
  href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@100..900&display=swap"
  rel="stylesheet"
/>
<link
  href="https://fonts.googleapis.com/css2?family=Lusitana:wght@400;700&display=swap"
  rel="stylesheet"
/>

<ion-content [fullscreen]="true">
  <div class="login-wrapper">
    <div class="glass-card">
      <!-- Header Section -->
      <div class="header-section">
        <div class="logo-container">
          <img src="assets/aromic logo.png" class="logo-icon" alt="Aromic Logo" />
        </div>
        <p class="subtitle">Architecture & Interior Design</p>
        <hr class="line-bottom" />
      </div>

      <h2 class="welcome-text">Welcome back to Your Studio!</h2>
      <p class="instr-text">
        Enter your credentials to continue your design journey
      </p>

      <!-- Form Container -->
      <div class="form-container">
        <div class="input-group">
          <label>Email/ Phone Number:</label>
          <ion-input
            type="text"
            [(ngModel)]="identifier"
            placeholder="Lillia110605@gmail.com"
            class="custom-input"
          ></ion-input>
        </div>

        <div class="input-group">
          <div class="label-row">
            <label>Password:</label>
            <a class="forgot-link">Forgot Password?</a>
          </div>
          <div class="password-wrapper">
            <ion-input
              [type]="passwordType"
              [(ngModel)]="password"
              placeholder="••••••••••••"
              class="custom-input"
            ></ion-input>
            <ion-icon
              [name]="passwordIcon"
              (click)="togglePassword()"
              class="toggle-icon"
            ></ion-icon>
          </div>
        </div>

        <div class="remember-me">
          <ion-checkbox
            [(ngModel)]="rememberMe"
            labelPlacement="end"
            justify="start"
            class="custom-checkbox"
          >
            <span class="checkbox-label">Remember me</span>
          </ion-checkbox>
        </div>

        <ion-button (click)="login()" class="login-btn" expand="block">
          LOGIN
        </ion-button>

        <div class="separator">
          <span class="line"></span>
          <span class="sep-text">or continue with</span>
          <span class="line"></span>
        </div>

        <div class="social-auth">
          <img
            src="assets/icon/google.png"
            alt="Google"
            class="social-icon"
          />
          <img
            src="assets/icon/facebook.png"
            alt="Facebook"
            class="social-icon"
          />
        </div>

        <p class="signup-prompt">
          Doesn't have an account? <a routerLink="/signup" class="signup-link">Sign up</a>
        </p>
      </div>
    </div>

    <!-- Footer Section -->
    <div class="footer-section">
      <div class="pagination-dots">
        <span class="dot"></span>
        <span class="dot active"></span>
        <span class="dot"></span>
      </div>
      <p class="luxury-text">Crafting Spaces. Defining Luxury.</p>
      
    </div>
  </div>
</ion-content>
