<ion-content [fullscreen]="true" class="ion-no-padding">
  <!-- Fixed Background Image -->
  <div class="fixed-background">
    <img src="../../assets/aromic background.png" alt="background" />
  </div>

  <!-- Main Overlay Content -->
  <div class="main-overlay">
    <!-- Header -->
    <div class="top-header">
      <ion-back-button
        defaultHref="/home"
        text=""
        icon="arrow-back"
        class="back-icon"
      ></ion-back-button>
      <h2 class="page-title">Room List</h2>
      <div class="room-badge">4 Rooms</div>
    </div>

    <!-- Glass Container -->
    <div class="glass-container">
      <!-- Floor 1 Section -->
      <div class="floor-section">
        <div class="floor-divider">
          <div class="line"></div>
          <div class="floor-badge">FLOOR 1</div>
          <div class="line"></div>
        </div>

        <!-- Room Cards -->
        <div class="room-card" *ngFor="let room of floor1Rooms">
          <div class="drag-dots">
            <span></span><span></span><span></span> <span></span><span></span
            ><span></span>
          </div>
          <img class="room-thumb" [src]="room.image" [alt]="room.name" />
          <div class="room-info">
            <h2>{{ room.name }}</h2>
            <p>{{ room.dimensions }} • {{ room.area }}m²</p>
          </div>
          <div class="room-actions">
            <ion-icon name="create-outline" (click)="editRoom(room)"></ion-icon>
            <ion-icon
              name="trash-outline"
              (click)="deleteRoom(room)"
            ></ion-icon>
          </div>
        </div>
      </div>

      <!-- Floor 2 Section -->
      <div class="floor-section">
        <div class="floor-divider">
          <div class="line"></div>
          <div class="floor-badge">FLOOR 2</div>
          <div class="line"></div>
        </div>

        <!-- Room Cards -->
        <div class="room-card" *ngFor="let room of floor2Rooms">
          <div class="drag-dots">
            <span></span><span></span><span></span> <span></span><span></span
            ><span></span>
          </div>
          <img class="room-thumb" [src]="room.image" [alt]="room.name" />
          <div class="room-info">
            <h2>{{ room.name }}</h2>
            <p>{{ room.dimensions }} • {{ room.area }}m²</p>
          </div>
          <div class="room-actions">
            <ion-icon name="create-outline" (click)="editRoom(room)"></ion-icon>
            <ion-icon
              name="trash-outline"
              (click)="deleteRoom(room)"
            ></ion-icon>
          </div>
        </div>
      </div>

      <!-- Empty State -->
      <div
        class="empty-state"
        *ngIf="floor1Rooms.length === 0 && floor2Rooms.length === 0"
      >
        <ion-icon name="home-outline"></ion-icon>
        <p>No rooms added yet</p>
        <button class="add-room-btn" (click)="addNewRoom()">
          Add Your First Room
        </button>
      </div>

      <!-- Bottom Spacing -->
      <div style="height: 20px"></div>
      <div class="action-footer">
        <button class="btn-primary-light" (click)="generate3DHouse()">
          <ion-icon name="cube-outline"></ion-icon>
          Generate 3D house
        </button>
      </div>
    </div>
  </div>

  <!-- FAB Button -->
 
</ion-content>
