<ion-content [fullscreen]="true" class="ion-no-padding">
  <div class="fixed-background">
    <img src="../../assets/aromic background.png" alt="background" />
  </div>

  <div class="main-overlay">
    <div class="top-header">
      <ion-back-button
        defaultHref="/home"
        text=""
        icon="arrow-back"
        class="back-icon"
      ></ion-back-button>
      <h2 class="page-title">Materials Library</h2>
      <ion-icon name="menu-outline" class="menu-icon"></ion-icon>
    </div>

    <div class="search-section">
      <div class="search-bar">
        <ion-icon name="search-outline"></ion-icon>
        <ion-input placeholder="Find Materials..."></ion-input>
      </div>

      <div class="filter-scroll">
        <button class="filter-pill active">All</button>
        <button class="filter-pill">Flooring</button>
        <button class="filter-pill">Walls</button>
        <button class="filter-pill">Furniture</button>
        <button class="filter-pill">Fixtures</button>
      </div>
    </div>

    <div class="materials-grid">
      <ion-grid>
        <ion-row>
          <ion-col size="6" *ngFor="let i of [1,2,3,4,5,6]">
            <div class="material-card">
              <div class="image-container">
                <img
                  src="../../assets/homepageImages/architecture{{(i % 4) + 1}}.png"
                />
                <div class="badge-3d">3D</div>
              </div>
              <div class="card-info">
                <div class="text-meta">
                  <h4>Oak Wood Flooring</h4>
                  <p>$45.24</p>
                </div>
                <ion-icon name="heart-outline" class="fav-icon"></ion-icon>
              </div>
            </div>
          </ion-col>
        </ion-row>
      </ion-grid>
    </div>
  </div>
</ion-content>
