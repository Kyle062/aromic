<ion-content [fullscreen]="true" class="page-content">
  <!-- Global Background Image Placeholder -->
  <div class="background-container">
    <img src="assets/placeholder-bg.jpg" alt="Background" class="bg-img" />
  </div>

  <!-- Top Transparent Navigation -->
  <div class="top-nav">
    <div class="logo-container">
      <!-- Logo Image Placeholder -->
      <img src="assets/placeholder-logo.png" alt="Logo" />
    </div>
    <ion-icon name="menu-outline" class="menu-icon"></ion-icon>
  </div>

  <!-- Main Rounded Content Container -->
  <div class="main-container">
    <!-- Custom Header inside the container -->
    <div class="container-header">
      <ion-icon name="arrow-back-outline" class="back-icon"></ion-icon>
      <h1 class="page-title">My Photo Designs</h1>
      <div class="spacer"></div>
    </div>

    <!-- Search Bar -->
    <div class="search-container">
      <ion-icon name="search-outline" class="search-icon"></ion-icon>
      <input type="text" placeholder="Find Design..." class="search-input" />
    </div>

    <!-- Design Cards List -->
    <div class="cards-list">
      <div class="design-card" *ngFor="let design of designs">
        <!-- Card Image Placeholder -->
        <img [src]="design.imgSrc" alt="Design Thumbnail" class="card-image" />

        <div class="card-content">
          <h2 class="card-title">{{ design.title }}</h2>
          <p class="card-details">{{ design.details }}</p>

          <div class="card-footer">
            <span class="category-pill">{{ design.category }}</span>
            <div class="actions">
              <ion-icon name="create-outline"></ion-icon>
              <ion-icon name="trash-outline"></ion-icon>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</ion-content>
