<ion-content [fullscreen]="true" class="page-content">
  <!-- Global Background Image Placeholder -->
  <div class="background-container">
    <img src="assets/placeholder-bg.jpg" alt="Background" class="bg-img" />
  </div>

  <!-- Top Transparent Navigation -->
  <div class="top-nav">
    <div class="logo-container">
      <!-- Logo Image Placeholder -->
      <img src="assets/placeholder-logo.png" alt="Logo" />
    </div>
    <ion-icon name="menu-outline" class="menu-icon"></ion-icon>
  </div>

  <!-- Main Rounded Content Container -->
  <div class="main-container">
    <!-- Custom Header inside the container -->
    <div class="container-header">
      <ion-icon name="arrow-back-outline" class="back-icon"></ion-icon>
      <h1 class="page-title">Favorite Materials</h1>
      <div class="spacer"></div>
    </div>

    <!-- Search Bar -->
    <div class="search-container">
      <ion-icon name="search-outline" class="search-icon"></ion-icon>
      <input type="text" placeholder="Find Materials..." class="search-input" />
    </div>

    <!-- Materials Grid Layout -->
    <div class="materials-grid">
      <div class="material-card" *ngFor="let item of favoriteMaterials">
        <!-- Product Image Placeholder -->
        <div class="image-wrapper">
          <img
            [src]="item.imgSrc"
            alt="{{ item.name }}"
            class="product-image"
          />
        </div>

        <div class="card-content">
          <div class="text-group">
            <h2 class="product-name">{{ item.name }}</h2>
            <p class="product-price">{{ item.price }}</p>
          </div>
          <!-- Red Heart Icon -->
          <ion-icon name="heart" class="favorite-icon"></ion-icon>
        </div>
      </div>
    </div>
  </div>
</ion-content>
