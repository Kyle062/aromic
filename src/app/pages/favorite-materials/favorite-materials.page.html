<ion-content [fullscreen]="true" class="page-content">
  <!-- Fixed Background Image -->
  <div class="background-container">
    <img
      src="../../assets/aromic background.png"
      alt="Background"
      class="bg-img"
    />
  </div>

  <!-- Top Navigation -->
  <div class="top-nav">
    <div class="logo-container">
      <img src="../../assets/homepageImages/logo.png" alt="Logo" />
    </div>
    <ion-icon
      name="menu-outline"
      class="menu-icon"
      (click)="openMenu()"
    ></ion-icon>
  </div>

  <!-- Main Container -->
  <div class="main-container">
    <!-- Header -->
    <div class="container-header">
      <ion-back-button
        defaultHref="/profile"
        text=""
        icon="arrow-back"
        class="back-icon"
      ></ion-back-button>
      <h1 class="page-title">Favorite Materials</h1>
      <div class="spacer"></div>
    </div>

    <!-- Search Bar -->
    <div class="search-container">
      <ion-icon name="search-outline" class="search-icon"></ion-icon>
      <input
        type="text"
        [(ngModel)]="searchQuery"
        placeholder="Find Materials..."
        class="search-input"
        (input)="filterMaterials()"
      />
      <ion-icon
        *ngIf="searchQuery"
        name="close-circle"
        class="clear-icon"
        (click)="clearSearch()"
      ></ion-icon>
    </div>

    <!-- Materials Grid -->
    <div class="materials-grid">
      <div
        class="material-card"
        *ngFor="let item of filteredMaterials; let i = index"
      >
        <div class="image-wrapper">
          <img
            [src]="item.imgSrc"
            alt="{{ item.name }}"
            class="product-image"
          />
        </div>

        <div class="card-content">
          <div class="text-group">
            <h2 class="product-name">{{ item.name }}</h2>
            <p class="product-price">{{ item.price }}</p>
          </div>
          <!-- ✅ Click to unfavorite -->
          <ion-icon
            name="heart"
            class="favorite-icon"
            (click)="removeFavorite(item, i)"
          ></ion-icon>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" *ngIf="filteredMaterials.length === 0">
      <ion-icon name="heart-outline"></ion-icon>
      <p *ngIf="searchQuery">No materials found</p>
      <p *ngIf="!searchQuery">No favorite materials yet</p>
      <button *ngIf="searchQuery" class="reset-btn" (click)="clearSearch()">
        Clear Search
      </button>
    </div>
  </div>
</ion-content>
