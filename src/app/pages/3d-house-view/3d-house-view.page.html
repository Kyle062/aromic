<ion-content [fullscreen]="true" scrollY="false">
  <div class="main-wrapper">
    <!-- Toolbar -->
    <div class="custom-toolbar">
      <div class="left-icons">
        <ion-button fill="clear" (click)="goBack()">
          <ion-icon name="arrow-back-outline"></ion-icon>
        </ion-button>
        <ion-button fill="clear" (click)="toggleAutoRotate()">
          <ion-icon name="arrow-undo-outline"></ion-icon>
        </ion-button>
        <ion-button fill="clear" (click)="resetView()">
          <ion-icon name="refresh-outline"></ion-icon>
        </ion-button>
        <ion-button fill="clear" (click)="toggleInteriorView()">
          <ion-icon
            [name]="isInteriorView ? 'eye-outline' : 'home-outline'"
          ></ion-icon>
        </ion-button>
      </div>
      <div class="right-icons">
        <ion-button fill="clear" (click)="toggleFloor()">
          <ion-icon name="layers-outline"></ion-icon>
          <span style="margin-left: 5px; font-size: 12px"
            >F{{ currentFloor }}</span
          >
        </ion-button>
        <ion-button fill="clear">
          <ion-icon name="save-outline"></ion-icon>
        </ion-button>
      </div>
    </div>

    <!-- 3D Viewport -->
    <div #canvasContainer class="image-viewport"></div>

    <!-- Controls Panel -->
    <div class="action-panel">
      <div class="toggle-row">
        <button
          class="btn-toggle"
          [class.active]="!showFrontWall"
          (click)="toggleFrontWall()"
        >
          <ion-icon name="eye-outline"></ion-icon>
          {{ showFrontWall ? 'HIDE WALLS' : 'SHOW WALLS' }}
        </button>
        <button class="btn-toggle active">
          <ion-icon name="home-outline"></ion-icon>
          MANSION
        </button>
      </div>

      <div class="floor-indicator">
        <span
          class="floor-badge"
          [class.active]="currentFloor === 1"
          (click)="currentFloor = 1; toggleFloor()"
        >
          🏠 Floor 1
        </span>
        <span class="floor-label">Living • Kitchen • Dining</span>
        <span
          class="floor-badge"
          [class.active]="currentFloor === 2"
          (click)="currentFloor = 2; toggleFloor()"
        >
          🛏️ Floor 2
        </span>
        <span class="floor-label">Master • Bedroom • Bath</span>
      </div>

      <button
        class="btn-wide secondary"
        (click)="generateDesign()"
        [disabled]="isGenerating"
      >
        <ion-spinner *ngIf="isGenerating" name="dots"></ion-spinner>
        <span *ngIf="!isGenerating">REDESIGN MANSION</span>
      </button>

      <div class="final-row">
        <button class="btn-half primary" (click)="goToHome()">SAVE</button>
        <button class="btn-half secondary" (click)="retryGeneration()">
          RESET
        </button>
      </div>
    </div>
  </div>
</ion-content>
