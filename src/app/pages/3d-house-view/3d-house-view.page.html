<ion-content [fullscreen]="true" scrollY="false">
  <div class="main-wrapper">
    <!-- Toolbar -->
    <div class="custom-toolbar">
      <div class="left-icons">
        <ion-button fill="clear" (click)="goBack()">
          <ion-icon name="arrow-back-outline"></ion-icon>
        </ion-button>
        <ion-button fill="clear" (click)="toggleAutoRotate()">
          <ion-icon name="arrow-undo-outline"></ion-icon>
        </ion-button>
        <ion-button fill="clear" (click)="resetView()">
          <ion-icon name="refresh-outline"></ion-icon>
        </ion-button>
      </div>
      <div class="right-icons">
        <ion-button fill="clear">
          <ion-icon name="save-outline"></ion-icon>
        </ion-button>
      </div>
    </div>

    <!-- 3D Viewport -->
    <div #canvasContainer class="image-viewport"></div>

    <!-- Controls Panel -->
    <div class="action-panel">
      <div class="toggle-row">
        <button
          class="btn-toggle"
          [class.active]="isAutoGenerate"
          (click)="isAutoGenerate = true"
        >
          AUTO GENERATE
        </button>
        <button
          class="btn-toggle"
          [class.active]="!isAutoGenerate"
          (click)="isAutoGenerate = false"
        >
          MANUAL ADJUST
        </button>
      </div>

      <button
        class="btn-wide secondary"
        (click)="generateDesign()"
        [disabled]="isGenerating"
      >
        <ion-spinner *ngIf="isGenerating" name="dots"></ion-spinner>
        <span *ngIf="!isGenerating">GENERATE DESIGN</span>
      </button>

      <div class="final-row">
        <button class="btn-half primary" (click)="goToHome()">ACCEPT</button>
        <button class="btn-half secondary" (click)="retryGeneration()">
          RETRY
        </button>
      </div>

      <div class="footer-icon">
        <ion-icon name="grid-outline"></ion-icon>
      </div>
    </div>
  </div>
</ion-content>
