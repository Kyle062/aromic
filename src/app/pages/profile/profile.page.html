<ion-content [fullscreen]="true" class="ion-no-padding">
  <div class="fixed-background">
    <img src="../../assets/aromic background.png" alt="background" />
  </div>

  <div class="main-content">
    <div class="top-bar">
      <div class="top-logo">
        <img src="../../assets/homepageImages/logo.png" alt="Aromic" />
      </div>
      <div class="top-menu" (click)="openMenu()">
        <ion-icon name="menu-outline"></ion-icon>
      </div>
    </div>

    <div class="profile-card">
      <div class="profile-avatar">
        <img src="../../assets/homepageImages/profile.png" alt="Profile" />
      </div>
      <div class="profile-info">
        <h1 class="profile-name">Kylla Jen</h1>
        <p class="profile-id">Designer ID: {{ userProfile.designerId }}</p>
        <p class="profile-email">{{ userProfile.email }}</p>
      </div>
    </div>

    <div class="stats-wrapper">
      <div class="stat-card" (click)="navigateTo('projects1')">
        <div class="stat-img">
          <img src="../../../assets/pro1.png" alt="Projects" />
        </div>
        <div class="stat-content">
          <span class="stat-num">{{ stats.projects }}</span>
          <span class="stat-txt">Projects</span>
        </div>
      </div>

      <div class="stat-card" (click)="navigateTo('room-list')">
        <div class="stat-img">
          <img src="../../../assets/pro2.png" alt="Rooms" />
        </div>
        <div class="stat-content">
          <span class="stat-num">{{ stats.rooms }}</span>
          <span class="stat-txt">Rooms</span>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-img">
          <img src="../../../assets/pro3.png" alt="Saved" />
        </div>
        <div class="stat-content">
          <span class="stat-num">{{ stats.saved }}</span>
          <span class="stat-txt">Saved</span>
        </div>
      </div>
    </div>

    <div class="glass-2">
      <div class="menu-wrapper">
        <div class="menu-box">
          <div class="menu-row" (click)="navigateTo('projects1')">
            <div class="menu-left">
              <ion-icon name="briefcase-outline" class="menu-ico"></ion-icon>
              <span class="menu-text">My Projects</span>
            </div>
            <ion-icon name="chevron-forward-outline" class="arrow"></ion-icon>
          </div>

          <!-- ✅ CHANGED: photo-design → my-photo-design -->
          <div class="menu-row" (click)="navigateTo('my-photo-design')">
            <div class="menu-left">
              <ion-icon name="images-outline" class="menu-ico"></ion-icon>
              <span class="menu-text">My Photo Designs</span>
            </div>
            <ion-icon name="chevron-forward-outline" class="arrow"></ion-icon>
          </div>

          <div class="menu-row" (click)="navigateTo('favorite-materials')">
            <div class="menu-left">
              <ion-icon
                name="star-outline"
                class="menu-ico favorite-ico"
              ></ion-icon>
              <span class="menu-text">Favorite Materials</span>
            </div>
            <ion-icon name="chevron-forward-outline" class="arrow"></ion-icon>
          </div>
        </div>

        <div class="menu-box">
          <div class="menu-row" (click)="navigateTo('settings')">
            <div class="menu-left">
              <ion-icon name="settings-outline" class="menu-ico"></ion-icon>
              <span class="menu-text">Settings</span>
            </div>
            <ion-icon name="chevron-forward-outline" class="arrow"></ion-icon>
          </div>

          <div class="menu-row" (click)="navigateTo('help-support')">
            <div class="menu-left">
              <ion-icon name="headset-outline" class="menu-ico"></ion-icon>
              <span class="menu-text">Help & Support</span>
            </div>
            <ion-icon name="chevron-forward-outline" class="arrow"></ion-icon>
          </div>

          <div class="menu-row" (click)="navigateTo('about')">
            <div class="menu-left">
              <ion-icon
                name="information-circle-outline"
                class="menu-ico"
              ></ion-icon>
              <span class="menu-text">About Aromic</span>
            </div>
            <ion-icon name="chevron-forward-outline" class="arrow"></ion-icon>
          </div>
        </div>

        <div class="menu-box logout-box">
          <div class="menu-row" (click)="onLogout()">
            <div class="menu-left">
              <ion-icon
                name="log-out-outline"
                class="menu-ico logout-ico"
              ></ion-icon>
              <span class="menu-text logout-text">Logout</span>
            </div>
            <ion-icon name="chevron-forward-outline" class="arrow"></ion-icon>
          </div>
        </div>
      </div>
    </div>

    <div class="bottom-space"></div>
  </div>
</ion-content>
