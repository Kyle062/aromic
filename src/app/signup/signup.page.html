<link
  href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@100..900&display=swap"
  rel="stylesheet"
/>
<link
  href="https://fonts.googleapis.com/css2?family=Lusitana:wght@400;700&display=swap"
  rel="stylesheet"
/>

<ion-content [fullscreen]="true">
  <div class="login-wrapper">
    <div class="glass-card">
      <!-- Header Section -->
      <div class="header-section">
        <div class="logo-container">
          <img src="assets/aromic logo.png" class="logo-icon" alt="Aromic Logo" />
        </div>
        <p class="subtitle">Architecture & Interior Design</p>
        <hr class="line-bottom" />
      </div>

      <h2 class="welcome-text">Get Started!</h2>
      <p class="instr-text">Enter your details to create an account</p>

      <!-- Form Container -->
      <div class="form-container">
        <div class="input-group">
          <label>Email/ Phone Number:</label>
          <ion-input
            type="email"
            [(ngModel)]="email"
            placeholder="Lillia110605@gmail.com"
            class="custom-input"
          ></ion-input>
        </div>

        <div class="input-group">
          <label>Username:</label>
          <ion-input
            type="text"
            [(ngModel)]="username"
            placeholder="Kayieee123"
            class="custom-input"
          ></ion-input>
        </div>

        <div class="input-group">
          <label>Create Password:</label>
          <div class="password-wrapper">
            <ion-input
              [type]="passwordType"
              [(ngModel)]="password"
              placeholder="••••••••••••"
              class="custom-input"
            ></ion-input>
            <ion-icon
              [name]="passwordIcon"
              (click)="togglePassword()"
              class="toggle-icon"
            ></ion-icon>
          </div>
        </div>

        <div class="input-group">
          <label>Confirm Password:</label>
          <div class="password-wrapper">
            <ion-input
              [type]="confirmPasswordType"
              [(ngModel)]="confirmPassword"
              placeholder="••••••••••••"
              class="custom-input"
            ></ion-input>
            <ion-icon
              [name]="confirmPasswordIcon"
              (click)="toggleConfirmPassword()"
              class="toggle-icon"
            ></ion-icon>
          </div>
        </div>

        <div class="terms-checkbox">
          <ion-checkbox
            [(ngModel)]="termsAccepted"
            labelPlacement="end"
            justify="start"
            class="custom-checkbox"
          >
            <span class="checkbox-label">I accept the terms of use and Privacy Policy</span>
          </ion-checkbox>
        </div>

        <ion-button expand="block" class="login-btn" (click)="signup()">
          SIGN UP
        </ion-button>

        <div class="separator">
          <span class="line"></span>
          <span class="sep-text">or continue with</span>
          <span class="line"></span>
        </div>

        <div class="social-auth">
          <img
            src="assets/icon/google.png"
            alt="Google"
            class="social-icon"
          />
          <img
            src="assets/icon/facebook.png"
            alt="Facebook"
            class="social-icon"
          />
        </div>

        <p class="signup-prompt">
          Already have an account? <a routerLink="/login" class="signup-link">Log in</a>
        </p>
      </div>
    </div>

    <!-- Footer Section -->
    <div class="footer-section">
      <div class="pagination-dots">
        <span class="dot"></span>
        <span class="dot active"></span>
        <span class="dot"></span>
      </div>
      <p class="luxury-text">Crafting Spaces. Defining Luxury.</p>
    </div>
  </div>
</ion-content>
