<ion-content [fullscreen]="true" class="ion-no-padding">
  <div class="fixed-background">
    <img src="../../assets/aromic background.png" alt="background" />
  </div>

  <div class="main-overlay">
    <div class="top-header">
      <img src="../../assets/homepageImages/logo.png" class="logo-icon" />
      <ion-icon name="menu-outline" class="menu-icon"></ion-icon>
    </div>

    <div class="glass-header">
      <ion-icon name="information-outline" class="info-icon-small"></ion-icon>

      <div class="profile-info">
        <ion-avatar>
          <img src="../../assets/homepageImages/profile.png" alt="Profile" />
        </ion-avatar>
        <div class="text-group">
          <h2>Hello, Kylla Jen!</h2>
          <p>
            Explore Aromic Architecture and Interior Design to elevate your home
            designs.
          </p>
          <button class="pill-button">ACTIVE PROJECTS</button>
        </div>
      </div>

      <div class="add-btn-container">
        <div class="add-pill">
          <ion-icon name="add-outline"></ion-icon>
        </div>
      </div>
    </div>

    <div class="glass-2">
      <ion-grid class="ion-no-padding">
        <ion-row>
          <ion-col size="6">
            <div class="cat-card" [routerLink]="['/new-architecture-project']">
              <img src="../../assets/homepageImages/architecture1.png" />
              <div class="cat-label">
                <ion-icon name="home-outline"></ion-icon>
                <span>Architecture</span>
                <ion-icon
                  name="arrow-forward-circle-outline"
                  class="end"
                ></ion-icon>
              </div>
            </div>
          </ion-col>
          <ion-col size="6">
            <div class="cat-card" [routerLink]="['/materials-library']">
              <img src="../../assets/homepageImages/architecture2.png" />
              <div class="cat-label">
                <ion-icon name="layers-outline"></ion-icon>
                <span>Materials</span>
                <ion-icon
                  name="arrow-forward-circle-outline"
                  class="end"
                ></ion-icon>
              </div>
            </div>
          </ion-col>
        </ion-row>
        <ion-row>
          <ion-col size="6">
            <div class="cat-card" (click)="navigateToPhotoDesign()">
              <img src="../../assets/homepageImages/architecture3.png" />
              <div class="cat-label">
                <ion-icon name="aperture-outline"></ion-icon>
                <span>Photo Design</span>
                <ion-icon
                  name="arrow-forward-circle-outline"
                  class="end"
                ></ion-icon>
              </div>
            </div>
          </ion-col>
          <ion-col size="6">
            <div class="cat-card" [routerLink]="['/projects1']">
              <img src="../../assets/homepageImages/architecture4.png" />
              <div class="cat-label">
                <ion-icon name="grid-outline"></ion-icon>
                <span>Projects</span>
                <ion-icon
                  name="arrow-forward-circle-outline"
                  class="end"
                ></ion-icon>
              </div>
            </div>
          </ion-col>
        </ion-row>
      </ion-grid>

      <h3 class="recent-title">Recent Projects</h3>
      <div class="recent-card">
        <img src="../../assets/homepageImages/project1.png" class="thumb" />
        <div class="details">
          <h4>Modern Villa</h4>
          <p>3 rooms • 1 floor</p>
          <div class="status-bar">
            <span class="segment active"></span>
            <span class="segment"></span>
          </div>
        </div>
        <button class="continue-btn">Continue <span>&gt;</span></button>
      </div>
    </div>
  </div>
</ion-content>
